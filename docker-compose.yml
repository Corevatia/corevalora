x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "3"

services:
  db:
    image: postgres:17
    container_name: corevalora-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corevalora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-corevalora}
    logging: *default-logging
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-corevalora} -d ${POSTGRES_DB:-corevalora}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-test:
    image: postgres:17
    container_name: corevalora-pg-test
    profiles: ["test"]
    environment:
      POSTGRES_USER: corevalora
      POSTGRES_PASSWORD: test
      POSTGRES_DB: corevalora_test
    logging: *default-logging
    ports:
      - "127.0.0.1:5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corevalora -d corevalora_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: corevalora-backend
    # API keys, DB credentials and backend config come from root .env ...
    env_file:
      - ./.env
    # ... but these are overridden here so they're correct inside the compose network.
    environment:
      # Inside the network the database host is "db", not localhost.
      # assembles DB_URL from these parts (see backend/core/config.py)
      POSTGRES_HOST: db
      # Must match the origin the browser loads the frontend from (see frontend port).
      CORS_ORIGINS: http://localhost:5173
    logging: *default-logging
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the bundle at build time; the browser calls the backend
        # via this published host port.
        VITE_API_URL: http://localhost:8000
    container_name: corevalora-frontend
    logging: *default-logging
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
