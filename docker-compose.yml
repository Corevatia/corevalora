services:
  db:
    image: postgres:17
    container_name: corevalora-pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-corevalora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-corevalora}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
