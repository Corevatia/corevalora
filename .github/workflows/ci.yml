name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    env:
      MARKETSTACK_API_KEY: ci-dummy
      COINCAP_API_KEY: ci-dummy
      POSTGRES_PASSWORD: test
      TEST_DB_URL: postgresql+psycopg://corevalora:test@localhost:5433/corevalora_test

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: corevalora
          POSTGRES_PASSWORD: test
          POSTGRES_DB: corevalora_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U corevalora"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        run: pytest -v

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
